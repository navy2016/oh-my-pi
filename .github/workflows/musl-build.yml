name: Build musl (Alpine) binary

on:
   workflow_dispatch:
      inputs:
         arch:
            description: Target architecture
            type: choice
            options:
               - x86_64
               - aarch64
            default: aarch64
         ref:
            description: Git ref to build (branch, tag, or commit SHA)
            type: string
            default: main

permissions:
   contents: read

jobs:
   build_musl:
      name: Build omp for linux-${{ inputs.arch }}-musl
      runs-on: ubuntu-22.04
      container:
         image: alpine:3.21
         options: --user root
      steps:
         - name: Install system dependencies
           shell: sh
           run: |
              apk update
              apk add --no-cache \
                 curl bash ca-certificates git build-base \
                 musl-dev gcc g++ \
                 rust cargo \
                 zig \
                 openssl-dev openssl-libs-static \
                 cmake pkgconfig unzip

         - name: Install bun
           shell: sh
           run: |
              BUN_VERSION="1.3.14"
              case "$(uname -m)" in
                 x86_64)  BUN_ARCH="x64" ;;
                 aarch64) BUN_ARCH="aarch64" ;;
                 *) echo "Unsupported arch: $(uname -m)"; exit 1 ;;
              esac
              BUN_URL="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-${BUN_ARCH}.zip"
              echo "Downloading ${BUN_URL}"
              curl -fsSL "$BUN_URL" -o /tmp/bun.zip
              unzip -q /tmp/bun.zip -d /tmp/bun
              install -m 755 /tmp/bun/bun-linux-${BUN_ARCH}/bun /usr/local/bin/bun
              bun --version

         - name: Add musl Rust target
           shell: sh
           run: |
              TARGET_ARCH="${{ inputs.arch }}"
              if [ "$TARGET_ARCH" = "x86_64" ]; then
                rustup target add x86_64-unknown-linux-musl
              else
                rustup target add aarch64-unknown-linux-musl
              fi

         - name: Checkout code
           uses: actions/checkout@v4
           with:
              ref: ${{ inputs.ref }}
              fetch-depth: 1

         - name: Cache cargo registry
           uses: actions/cache@v4
           with:
              path: |
                 /root/.cargo/registry
                 /root/.cargo/git
              key: musl-cargo-${{ hashFiles('Cargo.lock') }}
              restore-keys: musl-cargo-

         - name: Cache bun dependencies
           uses: actions/cache@v4
           with:
              path: /root/.bun/install/cache
              key: musl-bun-${{ hashFiles('bun.lock') }}
              restore-keys: musl-bun-

         - name: Install JS dependencies
           shell: sh
           run: bun install --frozen-lockfile --ignore-scripts

         - name: Infer build arch from container
           shell: sh
           id: infer-arch
           run: |
              ARCH=$(uname -m)
              if [ "$ARCH" = "x86_64" ]; then
                echo "arch=x64" >> $GITHUB_OUTPUT
                echo "rust_triple=x86_64-unknown-linux-musl" >> $GITHUB_OUTPUT
              else
                echo "arch=arm64" >> $GITHUB_OUTPUT
                echo "rust_triple=aarch64-unknown-linux-musl" >> $GITHUB_OUTPUT
              fi
              echo "host_arch=$ARCH" >> $GITHUB_OUTPUT

         - name: Build pi_natives native addon (musl)
           shell: sh
           env:
              RUST_TARGET: ${{ steps.infer-arch.outputs.rust_triple }}
              TARGET_ARCH: ${{ steps.infer-arch.outputs.arch }}
           run: |
              echo "Building pi_natives for $RUST_TARGET..."
              cd crates/pi-natives
              cargo build --release --target "$RUST_TARGET"
              cd ../..
              mkdir -p packages/natives/native
              cp \
                "crates/pi-natives/target/$RUST_TARGET/release/libpi_natives.so" \
                "packages/natives/native/pi_natives.linux-${TARGET_ARCH}.node"
              echo "=== Verify musl linkage ==="
              readelf -d packages/natives/native/pi_natives.linux-${TARGET_ARCH}.node | grep -i musl || \
                echo "WARNING: addon may not be musl-linked"
              file packages/natives/native/pi_natives.linux-${TARGET_ARCH}.node

         - name: Generate docs index
           shell: sh
           run: |
              bun --cwd=packages/coding-agent run generate-docs-index 2>&1 || true

         - name: Build omp binary (musl)
           shell: sh
           env:
              TARGET_ARCH: ${{ steps.infer-arch.outputs.arch }}
           run: |
              MUSL_TARGET="bun-linux-${TARGET_ARCH}-musl"
              echo "Building omp for target: $MUSL_TARGET"
              bun build \
                 --compile \
                 --target "$MUSL_TARGET" \
                 --no-compile-autoload-bunfig \
                 --no-compile-autoload-dotenv \
                 --no-compile-autoload-tsconfig \
                 --no-compile-autoload-package-json \
                 --keep-names \
                 --define "process.env.PI_COMPILED=true" \
                 --external fastembed \
                 --external onnxruntime-node \
                 --root . \
                 ./packages/coding-agent/src/cli.ts \
                 --outfile "omp-linux-${TARGET_ARCH}-musl"

         - name: Smoke test binary
           shell: sh
           run: |
              TARGET_ARCH="${{ steps.infer-arch.outputs.arch }}"
              chmod +x "omp-linux-${TARGET_ARCH}-musl"
              runtime_dir="$(mktemp -d)"
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" \
                "./omp-linux-${TARGET_ARCH}-musl" --version

         - name: Upload musl binary
           uses: actions/upload-artifact@v4
           with:
              name: omp-linux-${{ steps.infer-arch.outputs.arch }}-musl
              path: omp-linux-*-musl
              retention-days: 90
