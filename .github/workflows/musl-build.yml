name: Build musl (Alpine) binary

on:
   workflow_dispatch:
      inputs:
         arch:
            description: Target architecture
            type: choice
            options:
               - x86_64
               - aarch64
            default: aarch64
         ref:
            description: Git ref to build (branch, tag, or commit SHA)
            type: string
            default: main

permissions:
   contents: read

jobs:
   build_musl:
      name: Build omp for linux-${{ inputs.arch }}-musl
      runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}
      steps:
         - name: Install system dependencies
           shell: bash
           run: |
              set -eu
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends                  build-essential gcc g++                  musl-tools musl                  cmake pkg-config unzip curl                  libssl-dev openssl

         - name: Setup bun (musl)
           shell: bash
           run: |
              set -eu
              BUN_VERSION="1.3.14"
              case "$(uname -m)" in
                 x86_64)  BUN_ARCH="x64" ;;
                 aarch64) BUN_ARCH="aarch64" ;;
                 *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
              esac
              BUN_URL="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-${BUN_ARCH}.zip"
              echo "Downloading bun from: $BUN_URL"
              curl -fL "$BUN_URL" -o bun.zip
              unzip -q bun.zip -d bun-extract
              BUN_BIN="$(find bun-extract -type f -name bun | head -n 1)"
              [ -z "$BUN_BIN" ] && { echo "bun binary not found" >&2; exit 1; }
              sudo install -m 755 "$BUN_BIN" /usr/local/bin/bun
              bun --version

         - name: Setup Rust toolchain (nightly + musl target)
           shell: bash
           run: |
              set -eu
              case "$(uname -m)" in
                 x86_64)  TARGET="x86_64-unknown-linux-musl" ;;
                 aarch64) TARGET="aarch64-unknown-linux-musl" ;;
                 *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
              esac
              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs                 | sh -s -- -y --default-toolchain nightly-2026-04-29                     --profile minimal --target "$TARGET"
              source "$HOME/.cargo/env"
              echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
              rustc --version
              cargo --version

         - name: Checkout code
           uses: actions/checkout@v4
           with:
              ref: ${{ inputs.ref }}
              fetch-depth: 1

         - name: Cache cargo registry
           uses: actions/cache@v4
           with:
              path: |
                 ~/.cargo/registry
                 ~/.cargo/git
              key: musl-cargo-${{ hashFiles('Cargo.lock') }}
              restore-keys: musl-cargo-

         - name: Cache bun dependencies
           uses: actions/cache@v4
           with:
              path: ~/.bun/install/cache
              key: musl-bun-${{ hashFiles('bun.lock') }}
              restore-keys: musl-bun-

         - name: Install JS dependencies
           shell: bash
           run: bun install --frozen-lockfile --ignore-scripts

         - name: Infer build arch
           shell: bash
           id: infer-arch
           run: |
              ARCH=$(uname -m)
              if [ "$ARCH" = "x86_64" ]; then
                echo "arch=x64" >> $GITHUB_OUTPUT
                echo "rust_triple=x86_64-unknown-linux-musl" >> $GITHUB_OUTPUT
              else
                echo "arch=arm64" >> $GITHUB_OUTPUT
                echo "rust_triple=aarch64-unknown-linux-musl" >> $GITHUB_OUTPUT
              fi

         - name: Build pi_natives native addon (musl)
           shell: bash
           env:
              RUST_TARGET: ${{ steps.infer-arch.outputs.rust_triple }}
              TARGET_ARCH: ${{ steps.infer-arch.outputs.arch }}
           run: |
              set -eu
              # musl-gcc can't find libgcc_s.so by default; locate it via gcc.
              GCC_LIB_DIR="$(dirname "$(gcc -print-file-name=libgcc_s.so.1)")"
              echo "libgcc_s dir: $GCC_LIB_DIR"
              export RUSTFLAGS="-C target-feature=-crt-static -C link-arg=-L${GCC_LIB_DIR}"
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
              echo "Building pi_natives for $RUST_TARGET..."
              cd crates/pi-natives
              cargo build --release --target "$RUST_TARGET"
              cd ../..
              mkdir -p packages/natives/native
              cp                 "target/$RUST_TARGET/release/libpi_natives.so"                 "packages/natives/native/pi_natives.linux-${TARGET_ARCH}.node"
              echo "=== Verify musl linkage ==="
              readelf -d packages/natives/native/pi_natives.linux-${TARGET_ARCH}.node                 | grep -i musl || echo "WARNING: addon may not be musl-linked"
              file packages/natives/native/pi_natives.linux-${TARGET_ARCH}.node

         - name: Run prepack (generate docs, tool-views, bundle dist)
           shell: bash
           continue-on-error: true
           run: |
              set -eu
              cd packages/coding-agent
              bun scripts/generate-docs-index.ts --generate
              bun --cwd=../collab-web run build:tool-views
              bun scripts/bundle-dist.ts

         - name: Build omp binary (musl)
           shell: bash
           env:
              TARGET_ARCH: ${{ steps.infer-arch.outputs.arch }}
           run: |
              set -eu
              MUSL_TARGET="bun-linux-${TARGET_ARCH}-musl"
              echo "Building omp for target: $MUSL_TARGET"
              bun build                  --compile                  --target "$MUSL_TARGET"                  --no-compile-autoload-bunfig                  --no-compile-autoload-dotenv                  --no-compile-autoload-tsconfig                  --no-compile-autoload-package-json                  --keep-names                  --define "process.env.PI_COMPILED=true"                  --external fastembed                  --external onnxruntime-node                  --root .                  ./packages/coding-agent/src/cli.ts                  --outfile "omp-linux-${TARGET_ARCH}-musl"

         - name: Smoke test binary
           shell: bash
           run: |
              set -eu
              TARGET_ARCH="${{ steps.infer-arch.outputs.arch }}"
              chmod +x "omp-linux-${TARGET_ARCH}-musl"
              runtime_dir="$(mktemp -d)"
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg"                 "./omp-linux-${TARGET_ARCH}-musl" --version

         - name: Upload musl binary
           uses: actions/upload-artifact@v4
           with:
              name: omp-linux-${{ steps.infer-arch.outputs.arch }}-musl
              path: omp-linux-*-musl
              retention-days: 90
